<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Köppen Climate Analytics | Professional Suite</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a;
      --sidebar: #1e293b;
      --card: #33415550;
      --accent: #3b82f6;
      --accent-danger: #ef4444;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
      overflow: hidden;
    }

    .app-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    }

    .sidebar-header { padding: 32px 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-content { padding: 24px; flex-grow: 1; }

    h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--text-main); }
    h2 { margin: 0 0 12px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }

    .control-group { margin-bottom: 24px; }
    .input-field {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      margin-top: 5px;
    }

    /* Action Buttons */
    .btn-block {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 10px;
    }

    .btn-clear { background: rgba(239, 68, 68, 0.1); color: var(--accent-danger); border-color: rgba(239, 68, 68, 0.2); }
    .btn-clear:hover { background: var(--accent-danger); color: white; }

    /* Upload */
    .upload-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      background: var(--card);
      cursor: pointer;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
    #csvFile { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* Legend & Checklist */
    .legend-grid { display: grid; grid-template-columns: 1fr; gap: 4px; max-height: 200px; overflow-y: auto; padding-right: 5px; }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      background: rgba(255,255,255,0.03);
      padding: 6px 10px;
      border-radius: 6px;
    }
    .swatch { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

    #map { width: 100%; height: 100vh; background: #000; }
    
    .profile-footer { padding: 20px; background: #161e2e; border-top: 1px solid var(--border); text-align: center; }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Köppen Explorer</h1>
      <div id="status" style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Ready for data...</div>
    </div>

    <div class="sidebar-content">
      <div class="control-group">
        <h2>Location Search</h2>
        <input type="text" id="mapSearch" class="input-field" placeholder="Search country/city...">
      </div>

      <div class="control-group">
        <h2>Map Display Style</h2>
        <select id="mapStyle" class="input-field">
          <option value="dark">Dark Professional</option>
          <option value="light">Standard Light</option>
          <option value="satellite">Satellite Imagery</option>
        </select>
      </div>

      <div class="control-group">
        <h2>Data Management</h2>
        <div class="upload-zone" id="dropArea">
          <div style="font-size: 13px; font-weight: 600;">Click to Upload CSV</div>
          <input id="csvFile" type="file" accept=".csv" />
        </div>
        <button id="clearBtn" class="btn-block btn-clear">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M3 6h18m-2 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
          Clear Current Data
        </button>
      </div>

      <div class="control-group">
        <h2>Legend & Filtering</h2>
        <div id="legend" class="legend-grid">
           <span style="font-size: 11px; color: var(--text-muted)">No data points active.</span>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <div style="font-weight: 700; font-size: 14px;">Ali Mozhdehi Fard</div>
      <div style="font-size: 11px; color: var(--text-muted);">PhD Student • Nazarbayev University</div>
    </div>
  </aside>

  <main><div id="map"></div></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // Global Variables
  let rawData = [];
  const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
  L.control.zoom({ position: 'topright' }).addTo(map);

  const tiles = {
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' }),
    light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'OSM' }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'ESRI' })
  };
  tiles.dark.addTo(map);

  let layerGroup = L.layerGroup().addTo(map);

  const koppenColors = {
    "Af": "#0000ff", "Am": "#1565c0", "Aw": "#42a5f5", "BWh": "#ff0000",
    "BWk": "#ff8c00", "BSh": "#f4a460", "BSk": "#deb887", "Csa": "#ffff00",
    "Csb": "#e6e600", "Csc": "#cccc00", "Cwa": "#90ee90", "Cwb": "#66c266",
    "Cwc": "#3d8b3d", "Cfa": "#00ff00", "Cfb": "#32cd32", "Cfc": "#228b22",
    "Dsa": "#ff00ff", "Dsb": "#da70d6", "Dsc": "#ba55d3", "Dsd": "#9932cc",
    "Dwa": "#a52a2a", "Dwb": "#8b4513", "Dwc": "#6b3e26", "Dwd": "#4b2e1f",
    "Dfa": "#00ffff", "Dfb": "#00ced1", "Dfc": "#4682b4", "Dfd": "#1e3a5f",
    "ET": "#b0c4de", "EF": "#f5f5f5"
  };

  // Function to Clear Map & UI
  function clearAllData() {
    layerGroup.clearLayers();
    rawData = [];
    document.getElementById('csvFile').value = ""; // Reset input
    document.getElementById('legend').innerHTML = '<span style="font-size: 11px; color: var(--text-muted)">Data cleared.</span>';
    document.getElementById('status').textContent = "Map Reset Successfully";
    document.getElementById('status').style.color = "var(--text-muted)";
    map.flyTo([20, 0], 2);
  }

  document.getElementById('clearBtn').addEventListener('click', clearAllData);

  // Map Style Toggle
  document.getElementById('mapStyle').addEventListener('change', (e) => {
    Object.values(tiles).forEach(t => map.removeLayer(t));
    tiles[e.target.value].addTo(map);
  });

  // Search Toggle
  document.getElementById('mapSearch').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${e.target.value}`);
      const data = await res.json();
      if (data.length > 0) map.flyTo([data[0].lat, data[0].lon], 6);
    }
  });

  // Handle CSV
  document.getElementById('csvFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const rows = event.target.result.split('\n').filter(r => r.trim());
      const headers = rows[0].toLowerCase().split(',').map(h => h.trim());
      
      rawData = rows.slice(1).map(line => {
        const vals = line.split(',');
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i]?.trim());
        return { lat: parseFloat(obj.lat), lon: parseFloat(obj.lon), koppen: obj.koppen };
      }).filter(d => !isNaN(d.lat) && !isNaN(d.lon));

      renderMap();
    };
    reader.readAsText(file);
  });

  function renderMap() {
    layerGroup.clearLayers();
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    
    const classes = [...new Set(rawData.map(d => d.koppen))].sort();
    
    classes.forEach(cls => {
      const color = koppenColors[cls] || '#808080';
      legend.innerHTML += `
        <div class="legend-item">
          <span class="swatch" style="background:${color}"></span>
          <span>${cls}</span>
        </div>`;
    });

    const bounds = [];
    rawData.forEach(d => {
      const color = koppenColors[d.koppen] || '#ffffff';
      L.circleMarker([d.lat, d.lon], {
        radius: 6, fillColor: color, color: "#ffffff", weight: 1, fillOpacity: 0.9
      }).bindPopup(`<b>${d.koppen}</b><br>${d.lat}, ${d.lon}`).addTo(layerGroup);
      bounds.push([d.lat, d.lon]);
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
    document.getElementById('status').textContent = `Loaded ${rawData.length} points`;
    document.getElementById('status').style.color = "#4ade80";
  }
</script>
</body>
</html>

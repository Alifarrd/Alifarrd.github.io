<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Köppen Research Suite | NASA POWER Data</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a; --sidebar: #1e293b; --card: #33415550;
      --accent: #3b82f6; --danger: #ef4444; --text-main: #f8fafc;
      --text-muted: #94a3b8; --border: #334155;
    }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); overflow: hidden; }
    .app-container { display: grid; grid-template-columns: 380px 1fr; height: 100vh; }
    .sidebar { background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 1000; box-shadow: 10px 0 30px rgba(0,0,0,0.3); }
    .sidebar-header { padding: 24px; border-bottom: 1px solid var(--border); }
    .sidebar-content { padding: 24px; flex-grow: 1; overflow-y: auto; }
    h1 { margin: 0; font-size: 18px; font-weight: 800; }
    h2 { margin: 0 0 10px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
    .control-group { margin-bottom: 24px; }
    .input-field { width: 100%; padding: 10px; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; color: white; font-size: 13px; }
    .btn-clear { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.3); }
    .upload-zone { position: relative; border: 2px dashed var(--border); border-radius: 8px; padding: 15px; text-align: center; background: var(--card); cursor: pointer; }
    #csvFile { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .legend-scroll { max-height: 300px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; border: 1px solid var(--border); }
    .filter-item { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .filter-row { display: flex; align-items: center; gap: 8px; font-size: 12px; }
    .stat-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; }
    .stat-bar-fill { height: 100%; transition: width 0.6s ease; }
    #map { width: 100%; height: 100vh; background: #000; }
    .coord-hud { position: absolute; bottom: 20px; right: 20px; z-index: 1001; background: rgba(15, 23, 42, 0.85); padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border); font-family: monospace; font-size: 12px; color: var(--text-muted); pointer-events: none; }
    .footer { padding: 20px; border-top: 1px solid var(--border); font-size: 11px; text-align: center; }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Köppen Research Tool</h1>
      <div id="status" style="font-size: 10px; margin-top: 4px; color: var(--text-muted)">SYNC READY</div>
    </div>
    <div class="sidebar-content">
      <div class="control-group">
        <h2>Region Search</h2>
        <input type="text" id="mapSearch" class="input-field" placeholder="Search GPS or City...">
      </div>
      <div class="control-group">
        <h2>Map Layer</h2>
        <select id="mapStyle" class="input-field">
          <option value="dark">Dark (Best for Boundaries)</option>
          <option value="light">Detailed Light</option>
          <option value="satellite">Satellite Imagery</option>
        </select>
      </div>
      <div class="control-group">
        <h2>Data Import</h2>
        <div class="upload-zone">
          <div style="font-size: 12px; font-weight: 600;">Upload koppen_summary.csv</div>
          <input id="csvFile" type="file" accept=".csv" />
        </div>
        <button id="clearBtn" class="btn-clear">Reset Map</button>
      </div>
      <div class="control-group">
        <h2>Class Distribution</h2>
        <div id="legend" class="legend-scroll">
           <span style="font-size: 11px; color: var(--text-muted);">Awaiting Python output...</span>
        </div>
      </div>
    </div>
    <div class="footer"><strong>Ali Mozhdehi Fard</strong><br>PhD Student • Nazarbayev University</div>
  </aside>
  <main>
    <div id="map"></div>
    <div class="coord-hud" id="coordHud">LAT: 0.00 | LON: 0.00</div>
  </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  let rawData = [];
  let activeFilters = new Set();
  const map = L.map('map', { zoomControl: false, minZoom: 2 }).setView([48, 71], 4); // Defaulted toward Kazakhstan region
  
  // Track Mouse
  map.on('mousemove', e => { 
    document.getElementById('coordHud').innerHTML = `LAT: ${e.latlng.lat.toFixed(3)} | LON: ${e.latlng.lng.toFixed(3)}`; 
  });

  const tiles = {
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
    light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png'),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
  };
  tiles.dark.addTo(map);
  L.control.zoom({ position: 'topright' }).addTo(map);

  let layerGroup = L.layerGroup().addTo(map);

  // CSV Processing
  document.getElementById('csvFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = (evt) => {
      const rows = evt.target.result.split('\n').filter(r => r.trim());
      const headers = rows[0].toLowerCase().split(',').map(h => h.trim());
      
      rawData = rows.slice(1).map(line => {
        const vals = line.split(',');
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i]?.trim());
        return { 
          lat: parseFloat(obj.lat), 
          lon: parseFloat(obj.lon), 
          koppen: obj.koppen, 
          color: obj.color // Dynamically pull color from your Python script
        };
      }).filter(d => !isNaN(d.lat));

      activeFilters = new Set([...new Set(rawData.map(d => d.koppen))]);
      updateUI();
      renderPoints();
    };
    reader.readAsText(file);
  });

  function updateUI() {
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    const counts = {};
    rawData.forEach(d => counts[d.koppen] = (counts[d.koppen] || 0) + 1);
    
    Object.keys(counts).sort().forEach(cls => {
      const pct = ((counts[cls] / rawData.length) * 100).toFixed(1);
      const rowColor = rawData.find(d => d.koppen === cls).color || '#888';
      const div = document.createElement('div');
      div.className = 'filter-item';
      div.innerHTML = `
        <div class="filter-row">
          <input type="checkbox" checked data-cls="${cls}">
          <span class="stat-bar-fill" style="width:12px; height:12px; background:${rowColor}; border-radius:2px"></span>
          <span style="flex-grow:1">${cls}</span>
          <span style="font-size:10px">${pct}%</span>
        </div>
        <div class="stat-bar-bg"><div class="stat-bar-fill" style="width:${pct}%; background:${rowColor}"></div></div>
      `;
      div.querySelector('input').onchange = (e) => {
        e.target.checked ? activeFilters.add(cls) : activeFilters.delete(cls);
        renderPoints();
      };
      legend.appendChild(div);
    });
  }

  function renderPoints() {
    layerGroup.clearLayers();
    const bounds = [];
    rawData.forEach(d => {
      if (!activeFilters.has(d.koppen)) return;
      L.circleMarker([d.lat, d.lon], {
        radius: 5, fillColor: d.color, color: "#fff", weight: 0.5, fillOpacity: 0.9
      }).bindPopup(`<b>${d.koppen}</b><br>${d.lat}, ${d.lon}`).addTo(layerGroup);
      bounds.push([d.lat, d.lon]);
    });
    if (bounds.length) map.fitBounds(bounds);
  }

  document.getElementById('clearBtn').onclick = () => location.reload();
  document.getElementById('mapStyle').onchange = (e) => {
    Object.values(tiles).forEach(t => map.removeLayer(t));
    tiles[e.target.value].addTo(map);
  };
</script>
</body>
</html>

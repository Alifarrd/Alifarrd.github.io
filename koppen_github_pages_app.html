<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Köppen Climate Analytics | Professional Suite</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --bg: #0f172a;
      --sidebar: #1e293b;
      --card: #33415550;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: #334155;
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * { box-sizing: border-box; transition: all 0.2s ease; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text-main);
      overflow: hidden;
    }

    .app-container {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
    }

    .sidebar {
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      z-index: 10;
      box-shadow: 10px 0 30px rgba(0,0,0,0.3);
    }

    .sidebar-header { padding: 32px 24px 20px; border-bottom: 1px solid var(--border); }
    .sidebar-content { padding: 24px; flex-grow: 1; }

    h1 { margin: 0; font-size: 22px; font-weight: 800; color: var(--text-main); }
    h2 { margin: 0 0 12px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }

    /* Search & Style Controls */
    .control-group { margin-bottom: 20px; }
    .input-field {
      width: 100%;
      padding: 12px;
      background: #0f172a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: white;
      font-size: 14px;
      margin-top: 5px;
    }
    .input-field:focus { outline: none; border-color: var(--accent); }

    /* Upload Zone */
    .upload-zone {
      position: relative;
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 25px;
      text-align: center;
      background: var(--card);
      cursor: pointer;
      margin-bottom: 20px;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(59, 130, 246, 0.1); }
    #csvFile { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* Cards */
    .data-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .metric-row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; }
    .metric-val { font-family: monospace; color: var(--text-main); font-weight: 600; }

    /* Legend */
    .legend-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    .legend-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      background: rgba(255,255,255,0.05);
      padding: 4px 6px;
      border-radius: 4px;
    }
    .swatch { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Map Area */
    #map { width: 100%; height: 100vh; background: #000; }
    
    .profile-footer {
      padding: 20px;
      background: #161e2e;
      border-top: 1px solid var(--border);
      text-align: center;
    }
    .btn-row { display: flex; gap: 8px; justify-content: center; margin-top: 10px; }
    .btn-sm {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      text-decoration: none;
      background: #1e293b;
      border: 1px solid var(--border);
      color: var(--text-main);
    }
    .btn-sm:hover { background: var(--accent); border-color: var(--accent); }

    @media (max-width: 900px) {
      .app-container { grid-template-columns: 1fr; }
      .sidebar { height: auto; }
      #map { height: 60vh; }
    }
  </style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <div class="sidebar-header">
      <h1>Köppen Explorer</h1>
      <div id="status" style="font-size: 12px; color: var(--text-muted); margin-top: 5px;">Ready for data...</div>
    </div>

    <div class="sidebar-content">
      <div class="control-group">
        <h2>Location Search</h2>
        <input type="text" id="mapSearch" class="input-field" placeholder="Enter country or city...">
      </div>

      <div class="control-group">
        <h2>Visual Theme</h2>
        <select id="mapStyle" class="input-field">
          <option value="dark">Dark Professional (High Contrast)</option>
          <option value="light">Standard Light (Detailed)</option>
          <option value="satellite">Satellite Imagery</option>
        </select>
      </div>

      <div class="upload-zone">
        <div style="font-size: 14px; font-weight: 600;">Upload CSV</div>
        <div style="font-size: 11px; color: var(--text-muted);">lat, lon, koppen</div>
        <input id="csvFile" type="file" accept=".csv" />
      </div>

      <div class="data-card">
        <h2>Dataset Stats</h2>
        <div class="metric-row"><span>Points</span><span class="metric-val" id="count-p">0</span></div>
        <div class="metric-row"><span>Classes</span><span class="metric-val" id="count-c">0</span></div>
      </div>

      <div class="data-card">
        <h2>Legend</h2>
        <div id="legend" class="legend-grid">
           <span style="font-size: 11px; color: var(--text-muted)">Awaiting file...</span>
        </div>
      </div>
    </div>

    <div class="profile-footer">
      <div style="font-weight: 700; font-size: 14px;">Ali Mozhdehi Fard</div>
      <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 8px;">PhD Student • Nazarbayev University</div>
      <div class="btn-row">
        <a href="mailto:ali.mozhdehifard@gmail.com" class="btn-sm">Email</a>
        <a href="https://github.com/alifarrd" target="_blank" class="btn-sm">GitHub</a>
      </div>
    </div>
  </aside>

  <main><div id="map"></div></main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
  // 1. Setup Map & Layers
  const map = L.map('map', { zoomControl: false }).setView([20, 0], 2);
  L.control.zoom({ position: 'topright' }).addTo(map);

  const tiles = {
    dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: 'CARTO' }),
    light: L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', { attribution: 'OSM' }),
    satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { attribution: 'ESRI' })
  };
  tiles.dark.addTo(map);

  let layerGroup = L.layerGroup().addTo(map);

  // 2. Köppen Color Engine
  const koppenColors = {
    "Af": "#0000ff", "Am": "#1565c0", "Aw": "#42a5f5", "BWh": "#ff0000",
    "BWk": "#ff8c00", "BSh": "#f4a460", "BSk": "#deb887", "Csa": "#ffff00",
    "Csb": "#e6e600", "Csc": "#cccc00", "Cwa": "#90ee90", "Cwb": "#66c266",
    "Cwc": "#3d8b3d", "Cfa": "#00ff00", "Cfb": "#32cd32", "Cfc": "#228b22",
    "Dsa": "#ff00ff", "Dsb": "#da70d6", "Dsc": "#ba55d3", "Dsd": "#9932cc",
    "Dwa": "#a52a2a", "Dwb": "#8b4513", "Dwc": "#6b3e26", "Dwd": "#4b2e1f",
    "Dfa": "#00ffff", "Dfb": "#00ced1", "Dfc": "#4682b4", "Dfd": "#1e3a5f",
    "ET": "#b0c4de", "EF": "#f5f5f5"
  };

  // 3. UI Interactions
  document.getElementById('mapStyle').addEventListener('change', (e) => {
    Object.values(tiles).forEach(t => map.removeLayer(t));
    tiles[e.target.value].addTo(map);
  });

  document.getElementById('mapSearch').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
      const query = e.target.value;
      const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
      const data = await res.json();
      if (data.length > 0) {
        map.flyTo([data[0].lat, data[0].lon], 6);
      }
    }
  });

  // 4. Data Processing
  document.getElementById('csvFile').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = (event) => {
      const text = event.target.result;
      const rows = text.split('\n').filter(r => r.trim());
      const headers = rows[0].toLowerCase().split(',').map(h => h.trim());
      
      const parsedData = rows.slice(1).map(line => {
        const vals = line.split(',');
        const obj = {};
        headers.forEach((h, i) => obj[h] = vals[i]?.trim());
        return {
          lat: parseFloat(obj.lat),
          lon: parseFloat(obj.lon),
          koppen: obj.koppen,
          color: obj.color
        };
      }).filter(d => !isNaN(d.lat) && !isNaN(d.lon));

      renderPoints(parsedData);
    };
    reader.readAsText(file);
  });

  function renderPoints(data) {
    layerGroup.clearLayers();
    const legend = document.getElementById('legend');
    legend.innerHTML = '';
    
    const classes = [...new Set(data.map(d => d.koppen))].sort();
    document.getElementById('count-p').textContent = data.length;
    document.getElementById('count-c').textContent = classes.length;

    classes.forEach(cls => {
      const color = koppenColors[cls] || '#808080';
      legend.innerHTML += `<div class="legend-chip"><span class="swatch" style="background:${color}"></span>${cls}</div>`;
    });

    const bounds = [];
    data.forEach(d => {
      const color = d.color || koppenColors[d.koppen] || '#ffffff';
      L.circleMarker([d.lat, d.lon], {
        radius: 6,
        fillColor: color,
        color: "#ffffff",
        weight: 1,
        fillOpacity: 0.9
      }).bindPopup(`<strong>${d.koppen}</strong><br>${d.lat}, ${d.lon}`).addTo(layerGroup);
      bounds.push([d.lat, d.lon]);
    });

    if (bounds.length) map.fitBounds(bounds, { padding: [40, 40] });
    document.getElementById('status').textContent = `Loaded ${data.length} points`;
  }
</script>
</body>
</html>
